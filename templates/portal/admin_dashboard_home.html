{% extends "portal/base.html" %}

{% block content %}
<section class="tile-grid admin-tiles">
  <a class="tile" href="/portal/admin/members">
    <p>Total Members</p>
    <strong>{{ active_members_count }}</strong>
  </a>
  <a class="tile" href="/portal/admin/inventory">
    <p>Items Checked Out</p>
    <strong>{{ checked_out_now_count }}</strong>
  </a>
  <a class="tile" href="/portal/admin/prints">
    <p>Pending Print Requests</p>
    <strong>{{ pending_print_count }}</strong>
  </a>
  <a class="tile" href="/portal/admin/attendance">
    <p>Attendance Check-ins Today</p>
    <strong>{{ attendance_today_count }}</strong>
  </a>
</section>
{% endblock %}
